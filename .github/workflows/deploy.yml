name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - run: git lfs pull

      - run: |
          mkdir publish
          cp -R * publish/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4name: Deploy Pages

