<!doctypehtml><html lang=en-us><head><meta content="text/html; charset=utf-8"http-equiv=Content-Type><title>BoxedWine</title><meta content="boxedwine emulator"name=description><meta content="emulator,wine,windows,x86,PC,emscripten,web assembly,wasm,boxedwine"name=keywords><meta content="James Bryant, Kevin O'Dwyer"name=author><link href=boxedwine.css rel=stylesheet></head><body><div id=loading><figure id=spinner style=overflow:visible><div class=spinner style=margin-top:.5em;margin-left:auto;margin-right:auto></div></figure><div id=status class=emscripten>Downloading...</div><div class=emscripten><progress id=progress max=100 value=0></progress></div></div><div id=app><div id=controls class=emscripten><button onclick=start() id=startbtn style=display:none>Start</button> <button onclick='document.getElementById("upload").click()'id=uploadbtn style=display:none>Add File(s)</button> <input id=upload type=file onclick='document.getElementById("uploadbtn").click()'multiple name=upload onchange=startWithFiles(event.target.files) style=display:none> <button onclick=buildGetFilesModal() id=downloadbtn style=display:none>Get File(s)</button> <button onclick=saveJitModules() id=savejitbtn style=display:none>Save JIT Cache</button> <a href=#openModal id=modalLink style=display:none>Open</a> <a href=#openModalExe id=modalLinkExe style=display:none>Open</a> <span id=sound-checkbox style=display:none><input id=soundToggle type=checkbox onclick=toggleSound()>Enable Sound </span><input id=pointerLock type=checkbox>Lock/hide mouse pointer <input id=showConsole type=checkbox onclick=toggleConsole() checked>Show console</div><div id=dropzone><div class=emscripten_border><canvas class=emscripten id=canvas oncontextmenu=event.preventDefault()></canvas></div></div><div id=console><textarea class=emscripten id=output rows=8 style=display:none></textarea></div><div id=openModal class=modalDialog><div><a href=#close class=close title=Close onclick=closeGetFilesModal()>X</a><div><h3>Get File(s)</h3><input id=selectedItem size=50 readonly> <button onclick=extract()>Get</button></div><div id=tree class=scroll-style></div><div><h3 id=loadStatus>Loading...</h3></div></div></div><div id=openModalExe class=modalDialog><div><a href=#close id=openModalExeClick class=close title=Close>X</a><div><h3>Execute</h3><div id=message></div><div id=items class=scroll-style></div></div></div></div><hr></div><script src=boxedwine-shell.js></script><script src=boxedwine.js async></script></body></html>
